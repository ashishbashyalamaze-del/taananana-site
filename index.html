<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAANANANA | Professional Collective</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content" style="max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <h1 style="font-weight: 700; font-size: 1.5rem; margin:0;">TAANANANA.</h1>
            <nav>
                <ul style="display:flex; list-style:none; gap:20px; margin:0;">
                    <li><a href="index.html" style="text-decoration:none; color:inherit;">Shop</a></li>
                    <li><a href="cart.html" style="text-decoration:none; color:inherit; font-weight:600;">🛒 Cart (<span id="cart-count">0</span>)</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="max-width: 1200px; margin: auto; padding: 20px;">
        <div id="filter-bar" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:30px;">
            <input type="text" id="search" placeholder="Search products..." style="padding:10px 20px; border-radius:50px; border:1px solid #ddd; width:100%; max-width:300px;">
            <div id="category-filters">
                <button class="cat-btn active" data-cat="all">All Items</button>
            </div>
        </div>
        <div id="product-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:30px;"></div>
    </main>

    <div id="toast-container"></div>

    <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:2000; align-items:center; justify-content:center; padding:20px;">
        <div id="modal-content" style="background:var(--bg); padding:40px; border-radius:30px; max-width:800px; position:relative; width:100%;">
            <span id="close-modal" style="position:absolute; right:25px; top:20px; font-size:30px; cursor:pointer;">&times;</span>
            <div id="modal-inner"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
